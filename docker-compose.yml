# Convenience wrapper around the docker run commands in the README.
#
# Usage:
#   docker compose build
#   docker compose run --rm login          # one-time interactive login (paste-URL OAuth flow)
#   docker compose run --rm login-token    # or: mint a portable long-lived token instead
#   docker compose run --rm scrape         # one-shot scrape (human table)
#   docker compose run --rm scrape --json  # scrape with a CLI flag
#
# Copy .env.example to .env if you want to inject CLAUDE_CODE_OAUTH_TOKEN or
# ANTHROPIC_API_KEY instead of relying on the browser-login volume — .env is
# entirely optional otherwise.

services:
  login:
    build: .
    volumes:
      - claude-usage-data:/data
    stdin_open: true
    tty: true
    command: ["login"]

  login-token:
    build: .
    volumes:
      - claude-usage-data:/data
    stdin_open: true
    tty: true
    command: ["login", "--token"]

  scrape:
    build: .
    volumes:
      - claude-usage-data:/data
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    command: []

volumes:
  claude-usage-data:
